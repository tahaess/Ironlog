<title>IronLog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --acc:#f97316;--bg:#080810;--bg2:#111118;--bg3:#1a1a28;
  --border:#1e1e2e;--t1:#f0f0f8;--t2:#888;--t3:#444;
  --green:#22c55e;--red:#ef4444;--purple:#a855f7;--blue:#3b82f6;
  --sb:env(safe-area-inset-bottom,16px);--st:env(safe-area-inset-top,0px);
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
.pt{padding-top:calc(var(--st) + 90px);}

/* NAV */
nav{display:flex;background:#0a0a14;border-top:1px solid #111;padding-bottom:var(--sb);flex-shrink:0;}
nav button{flex:1;padding:8px 0 5px;background:none;border:none;cursor:pointer;font-family:inherit;}
nav .ni{font-size:18px;}
nav .nl{font-size:8px;letter-spacing:1px;margin-top:2px;font-weight:700;}
nav button.on .nl{color:var(--acc);}
nav button:not(.on) .nl{color:var(--t3);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.csm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;}
.sec{font-size:10px;color:var(--t3);letter-spacing:3px;margin-bottom:12px;}
h2{font-size:26px;font-weight:900;margin-bottom:4px;}
.sub{font-size:12px;color:var(--t3);margin-bottom:18px;}

/* BUTTONS */
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;margin-bottom:8px;}
.btn-acc{background:var(--acc);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-ghost{background:var(--bg2);border:1px solid var(--border);color:var(--t2);}
.btn-danger{background:#1a0a0a;border:1px solid #3a1a1a;color:var(--red);}
.back{background:#151520;border:1px solid var(--border);color:var(--t2);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:18px;flex-shrink:0;}
.inp{width:100%;background:#111;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--t1);font-family:inherit;font-size:14px;margin-bottom:10px;}
.inp:focus{outline:none;border-color:var(--acc);}
.lbl{font-size:10px;color:var(--t3);letter-spacing:3px;display:block;margin-bottom:6px;}

/* MUSCLE GRID */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mbtn{padding:20px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-align:left;cursor:pointer;font-family:inherit;}
.mbtn:active{border-color:var(--acc);}

/* LIST */
.lbtn{width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.lbtn:active{border-color:var(--acc);}
.pr{color:var(--acc);font-size:12px;font-weight:800;flex-shrink:0;margin-left:8px;}

/* LOG HEADER */
.lhdr{padding:12px 16px;border-bottom:1px solid #111;background:#0c0c18;flex-shrink:0;padding-top:calc(var(--st) + 76px);}

/* SETS LIST */
.set-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;}
.set-row.editing{border-color:var(--blue);background:#0a0f1a;}
.set-row.saved{border-color:#1a3a1a;}

/* PICKER */
.pzone{background:#0e0e1a;border-radius:16px;padding:0 8px;display:flex;align-items:center;}
.pcol{flex:1;display:flex;flex-direction:column;align-items:center;}
.plbl{font-size:10px;color:var(--t3);letter-spacing:3px;padding:10px 0 4px;}
.pwrap{position:relative;width:100%;height:308px;}
.picker{height:308px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.picker::-webkit-scrollbar{display:none;}
.pitem{height:44px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:22px;font-weight:600;color:#333;font-variant-numeric:tabular-nums;user-select:none;}
.pitem.sel{color:var(--t1);font-size:30px;font-weight:800;}
.pitem.near{color:#666;font-size:24px;}
.pgt{position:absolute;top:0;left:0;right:0;height:88px;background:linear-gradient(to bottom,#0e0e1a,transparent);pointer-events:none;z-index:2;}
.pgb{position:absolute;bottom:0;left:0;right:0;height:88px;background:linear-gradient(to top,#0e0e1a,transparent);pointer-events:none;z-index:2;}
.pline{position:absolute;left:4px;right:4px;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);pointer-events:none;z-index:1;border-radius:8px;}
.psep{font-size:28px;color:var(--t3);padding:0 4px;margin-top:132px;}

.sbtn{width:100%;padding:16px;border-radius:14px;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:1px;border:none;}
.sbtn.rdy{background:var(--acc);color:#fff;}
.sbtn.off{background:#111;border:1px solid var(--border);color:var(--t3);}
.rbtn{flex:1;padding:10px 0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.finbtn{border:1px solid var(--border);color:var(--t3);border-radius:10px;padding:10px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;background:var(--bg3);}
.finbtn.has{background:var(--acc);border-color:var(--acc);color:#fff;}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.sv{font-size:22px;font-weight:900;color:var(--acc);}
.sl{font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:2px;}
.barchart{display:flex;align-items:flex-end;gap:4px;height:90px;margin-top:8px;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;background:var(--acc);border-radius:4px 4px 0 0;opacity:.85;min-height:4px;}
.blbl{font-size:9px;color:var(--t3);text-align:center;}

/* CYCLE */
.sesbtn{width:100%;padding:14px 16px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.sesbtn:active{border-color:var(--blue);}
.daypill{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:13px;cursor:pointer;font-family:inherit;color:var(--t2);}
.daypill.on{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:700;}

/* ENHANCEMENT */
.pinwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;}
.pdots{display:flex;gap:16px;margin:16px 0;}
.pdot{width:16px;height:16px;border-radius:50%;background:var(--border);transition:background .2s;}
.pdot.fill{background:var(--purple);}
.ppad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:280px;}
.pkey{padding:18px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--t1);}
.pkey:active{opacity:.6;}
.injcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.injcard.done{border-color:var(--purple);background:#12091e;}
.injcard.today{border-color:var(--acc);}

/* SYNC BANNER */
#banner{display:none;position:fixed;top:calc(var(--st)+8px);left:50%;transform:translateX(-50%);z-index:999;background:#1a1a2e;border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;white-space:nowrap;}
#banner.s{display:block;color:var(--acc);}
#banner.ok{display:block;color:var(--green);}
#banner.err{display:block;color:var(--red);}
</style>

function load(){
  try{
    var d=JSON.parse(localStorage.getItem(LS)||'{}');
    if(d.sessions)S.sessions=d.sessions;
    if(d.prs)S.prs=d.prs;
    if(d.pending)S.pending=d.pending;
    if(d.lastSync)S.lastSync=d.lastSync;
    if(d.tCycles)S.tCycles=d.tCycles;
    if(d.activeCycle!==undefined)S.activeCycle=d.activeCycle;
    if(d.pinSet)S.pinSet=d.pinSet;
    if(d.eCycles)S.eCycles=d.eCycles;
    if(d.activeEnh!==undefined)S.activeEnh=d.activeEnh;
    // Restore in-progress session
    if(d.sess&&d.sess.exercise&&d.sess.sets&&d.sess.sets.length){
      S.sess=d.sess;
      S.curReps=d.curReps||8;
      S.curWeight=d.curWeight||60;
      S.selM=d.selM;S.selE=d.selE;S.selV=d.selV;
      if(S.sess.exercise)S.step='logging';
    }
  }catch(e){}
}

function banner(msg,type){

  if(type==='ok'||type==='err')setTimeout(function(){if(b)b.className='';},4000);
}
// ── SHEETS API ─────────────────────────────────────
async function sheetsPost(body){
  if(!SHEET_URL||SHEET_URL==='skip')return null;
  try{
    var r=await fetch(SHEET_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(body)
    });
    return await r.json();
  }catch(e){return null;}
}

// Sauvegarde un set immédiatement dans Sheets
async function saveSetToSheets(setData){
  var res=await sheetsPost({action:'saveSet',set:setData});
  if(res&&res.ok){banner('✓ Set '+setData.setNumber+' sauvegardé','ok');}
  else{banner('📵 Hors ligne — set en local','err');}
}

// Récupère la séance en cours depuis Sheets
async function loadEnCours(){
  if(!SHEET_URL||SHEET_URL==='skip')return null;
  try{
    var r=await fetch(SHEET_URL+'?action=getEnCours');
    var d=await r.json();
    if(d.ok&&d.sets&&d.sets.length)return d;
  }catch(e){}
  return null;
}

// Finalise la séance dans Sheets
async function finalizeSession(session){
  var res=await sheetsPost({action:'saveSession',session:session});
  if(res&&res.ok){
    S.lastSync=new Date().toISOString();save();
    banner('✓ Séance enregistrée !','ok');
  }
}

// Sync manuelle
async function sync(sessions,prs){
  if(!SHEET_URL||SHEET_URL==='skip')return;
  banner('⏳ Sync...','s');
  var res=await sheetsPost({action:'syncAll',sessions:sessions,prs:prs});
  if(res&&res.ok){S.pending=[];S.lastSync=new Date().toISOString();save();banner('✓ Synced — '+res.added+' ajoutées','ok');}
  else banner('📵 Hors ligne','err');
}

      S.sess.exercise=enCours.session.exercise;
      S.sess.muscle=enCours.session.muscle;
      S.sess.date=enCours.session.date;
      S.sess.sessionId=enCours.session.sessionId;
      // Find selM and selE from exercise name
      var parts=S.sess.exercise.split(' — ');
      if(parts.length>=2){
        MUSCLES.forEach(function(m){
          EXO[m.id].forEach(function(ex){
            if(ex.n===parts[0]){S.selM=m;S.selE=ex;S.selV=parts[1];}
          });
        });
      }
      if(S.sess.sets.length){S.step='logging';save();render();}
    }
    if(S.pending.length)sync(S.pending,S.prs);
  }
})();

function e(tag,attrs){var el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(function(kv){el.setAttribute(kv[0],kv[1]);});return el;}
function t(tag,txt,attrs){var el=e(tag,attrs);el.textContent=txt;return el;}
function today(){return new Date().toISOString().split('T')[0];}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function est1RM(w,r){return r===1?w:Math.round(w*(1+r/30));}

// ═══════════════════════════════════════════════════════
// PICKER
// ═══════════════════════════════════════════════════════
function mkPicker(items,cur,onChange,fmt){
  var wrap=e('div',{class:'pwrap'});
  var picker=e('div',{class:'picker'});
  var PAD=3;
  for(var i=0;i<PAD;i++)picker.appendChild(e('div',{class:'pitem'}));
  items.forEach(function(v){
    var item=e('div',{class:'pitem'});
    item.textContent=fmt?fmt(v):String(v);
    picker.appendChild(item);
  });
  for(var i=0;i<PAD;i++)picker.appendChild(e('div',{class:'pitem'}));
  wrap.appendChild(e('div',{class:'pline'}));
  wrap.appendChild(picker);
  wrap.appendChild(e('div',{class:'pgt'}));
  wrap.appendChild(e('div',{class:'pgb'}));
  var idx=items.findIndex(function(v){return Math.abs(v-cur)<0.01;});
  if(idx<0)idx=0;
  setTimeout(function(){picker.scrollTop=idx*44;upd();},0);
  function upd(){
    var si=Math.round(picker.scrollTop/44);
    picker.querySelectorAll('.pitem').forEach(function(item,i){
      var ri=i-PAD;var d=Math.abs(ri-si);
      item.classList.remove('sel','near');
      if(d===0)item.classList.add('sel');
      else if(d===1)item.classList.add('near');
    });
    if(si>=0&&si<items.length)onChange(items[si]);
  }
  var tm;
  picker.addEventListener('scroll',function(){
    upd();clearTimeout(tm);
    tm=setTimeout(function(){
      var si=Math.round(picker.scrollTop/44);
      picker.scrollTo({top:si*44,behavior:'smooth'});
      if(si>=0&&si<items.length)onChange(items[si]);
    },80);
  });
  return wrap;
}

function drawCurve(pts,key,label,color){
  var wrap2=e('div',{style:'margin-bottom:12px;'});
  wrap2.appendChild(t('div',label,{style:'font-size:9px;color:var(--t3);letter-spacing:3px;margin-bottom:8px;'}));
  var vals=pts.map(function(p){return p[key];});
  var mn=Math.min.apply(null,vals);var mx=Math.max.apply(null,vals);var range=mx-mn||1;
  var H=80;var W=100;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('style','width:100%;height:80px;overflow:visible;');
  var pathD='';var areaD='';
  pts.forEach(function(p,i){
    var x=pts.length===1?W/2:i*(W/(pts.length-1));
    var y=H-((p[key]-mn)/range)*(H*0.85)-H*0.075;
    if(i===0){pathD='M'+x.toFixed(1)+','+y.toFixed(1);areaD='M'+x.toFixed(1)+','+H+' L'+x.toFixed(1)+','+y.toFixed(1);}
    else{pathD+=' L'+x.toFixed(1)+','+y.toFixed(1);areaD+=' L'+x.toFixed(1)+','+y.toFixed(1);}
  });
  areaD+=' L'+((pts.length-1)*(W/(pts.length-1||1))).toFixed(1)+','+H+' Z';
  var area=document.createElementNS('http://www.w3.org/2000/svg','path');area.setAttribute('d',areaD);area.setAttribute('fill',color);area.setAttribute('opacity','0.08');svg.appendChild(area);
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',pathD);path.setAttribute('fill','none');path.setAttribute('stroke',color);path.setAttribute('stroke-width','1.5');path.setAttribute('stroke-linecap','round');path.setAttribute('stroke-linejoin','round');svg.appendChild(path);
  pts.forEach(function(p,i){
    var x=pts.length===1?W/2:i*(W/(pts.length-1));var y=H-((p[key]-mn)/range)*(H*0.85)-H*0.075;
    var circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('cx',x.toFixed(1));circle.setAttribute('cy',y.toFixed(1));circle.setAttribute('r','2.5');circle.setAttribute('fill',color);svg.appendChild(circle);
    if(i===0||i===pts.length-1){
      var txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',x.toFixed(1));txt.setAttribute('y',(y-6).toFixed(1));txt.setAttribute('text-anchor',i===0?'start':'end');txt.setAttribute('fill',color);txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');
      txt.textContent=p[key]+(key==='avgWeight'?'kg':'');svg.appendChild(txt);
    }
  });
  var xa=e('div',{style:'display:flex;justify-content:space-between;margin-top:4px;'});
  pts.forEach(function(p,i){if(i===0||i===pts.length-1||pts.length<=4)xa.appendChild(t('div',p.date.slice(5),{style:'font-size:9px;color:var(--t3);'}));});
  wrap2.appendChild(svg);wrap2.appendChild(xa);return wrap2;
}

function exportICS(cyc){
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//IronLog//FR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  (cyc.injections||[]).forEach(function(inj){
    if(inj.done)return;
    var d=inj.date.replace(/-/g,'');
    var prodStr=inj.products.map(function(p){return p.name+' '+p.dose+p.unit;}).join(' + ');
    lines.push('BEGIN:VEVENT','UID:ironlog-inj-'+inj.id+'@ironlog','DTSTART;VALUE=DATE:'+d,'DTEND;VALUE=DATE:'+d,'SUMMARY:💉 Injection — '+prodStr,'DESCRIPTION:'+prodStr,'BEGIN:VALARM','TRIGGER:-PT0M','ACTION:DISPLAY','DESCRIPTION:💉 Injection aujourd\'hui — '+prodStr,'END:VALARM','END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='injections-ironlog.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function markInj(cycId,injId){
  var cyc=S.eCycles.find(function(c){return c.id==cycId;});if(!cyc)return;
  var inj=cyc.injections.find(function(i){return i.id==injId;});if(inj){inj.done=true;inj.doneAt=new Date().toISOString();}
  save();render();
}

// ─── ACTIONS ─────────────────────────────────────────
function finishSession(){
  if(!S.sess.sets||!S.sess.sets.length){resetSess();return;}
  var maxRM=Math.max.apply(null,S.sess.sets.map(function(s){return est1RM(s.weight,s.reps);}));
  var vol=Math.round(S.sess.sets.reduce(function(a,s){return a+s.weight*s.reps;},0));
  var session={id:Date.now(),date:S.sess.date||today(),muscle:S.sess.muscle,exercise:S.sess.exercise,sets:S.sess.sets,estimated1RM:maxRM,totalVolume:vol};
  if(!S.prs[S.sess.exercise]||maxRM>S.prs[S.sess.exercise])S.prs[S.sess.exercise]=maxRM;
  S.sessions.unshift(session);S.pending.push(session);
  resetSess();save();
  // Finalize in Sheets (saves to Séances tab and clears EnCours)
  finalizeSession(session);
}

function resetSess(){
  S.sess={date:today(),muscle:'',exercise:'',sets:[],editIdx:-1,sessionId:''};
  S.curReps=8;S.curWeight=60;
  clearInterval(restIv);S.restSecs=0;S.restDur=90;
  S.step='muscle';S.selM=null;S.selE=null;S.selV=null;
  save();render();
}

function startRest(secs){
  clearInterval(restIv);S.restSecs=secs;S.restDur=secs;
  restIv=setInterval(function(){
    S.restSecs--;
    var rt=document.getElementById('rt');var rf=document.getElementById('rf');
    if(rt)rt.textContent=S.restSecs+'s';
    if(rf)rf.style.width=Math.round((S.restSecs/S.restDur)*100)+'%';
    if(S.restSecs<=0){clearInterval(restIv);S.restSecs=0;}
  },1000);
  if(!document.querySelector('#rf'))render();
}

render();
