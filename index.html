<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--acc:#f97316;--bg:#080810;--bg2:#111118;--bg3:#1a1a28;--border:#1e1e2e;--t1:#f0f0f8;--t2:#888;--t3:#444;--green:#22c55e;--red:#ef4444;--purple:#a855f7;--blue:#3b82f6;--safe-bottom:env(safe-area-inset-bottom,16px);--safe-top:env(safe-area-inset-top,0px);}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
.pad-top{padding-top:calc(var(--safe-top) + 88px);}
#sync-banner{display:none;position:fixed;top:calc(var(--safe-top)+8px);left:50%;transform:translateX(-50%);z-index:999;background:#1a1a2e;border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
#sync-banner.syncing{display:block;color:var(--acc);}
#sync-banner.ok{display:block;color:var(--green);}
#sync-banner.err{display:block;color:var(--red);}
nav{display:flex;background:#0a0a14;border-top:1px solid #111;padding-bottom:var(--safe-bottom);flex-shrink:0;}
nav button{flex:1;padding:8px 0 5px;background:none;border:none;cursor:pointer;font-family:inherit;}
nav .ico{font-size:18px;}
nav .lbl{font-size:8px;letter-spacing:1px;margin-top:2px;font-weight:700;}
nav button.active .lbl{color:var(--acc);}
nav button:not(.active) .lbl{color:var(--t3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;}
.sec-lbl{font-size:10px;color:var(--t3);letter-spacing:3px;margin-bottom:12px;}
h2{font-size:26px;font-weight:900;color:var(--t1);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--t3);margin-bottom:18px;}
.back-btn{background:#151520;border:1px solid var(--border);color:var(--t2);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:18px;flex-shrink:0;}
.big-btn{width:100%;padding:15px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;margin-bottom:10px;}
.big-btn.primary{background:var(--acc);color:#fff;}
.big-btn.blue{background:var(--blue);color:#fff;}
.big-btn.purple{background:var(--purple);color:#fff;}
.inp{width:100%;background:#111;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--t1);font-family:inherit;font-size:14px;margin-bottom:10px;}
.inp:focus{outline:none;border-color:var(--acc);}
.lbl-sm{font-size:10px;color:var(--t3);letter-spacing:3px;display:block;margin-bottom:6px;}
.danger-btn{width:100%;padding:14px;background:#1a0a0a;border:1px solid #3a1a1a;color:var(--red);border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.muscle-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.muscle-btn{padding:20px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-align:left;cursor:pointer;font-family:inherit;}
.muscle-btn:active{border-color:var(--acc);}
.list-btn{width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.list-btn:active{border-color:var(--acc);}
.pr-badge{color:var(--acc);font-size:12px;font-weight:800;flex-shrink:0;margin-left:8px;}
.log-header{padding:14px 16px 12px;border-bottom:1px solid #111;background:#0c0c18;flex-shrink:0;padding-top:calc(var(--safe-top) + 88px);}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;color:#aaa;transition:all .3s;}
.chip.flash{background:var(--acc);color:#fff;border-color:var(--acc);}
.chip.next{background:#111;border:1px dashed #2a2a3a;color:var(--t3);}
.rest-bar{display:flex;align-items:center;gap:10px;margin-top:10px;}
.rest-track{flex:1;height:3px;background:#1a1a2a;border-radius:2px;}
.rest-fill{height:100%;background:var(--acc);border-radius:2px;transition:width 1s linear;}
.rest-time{font-size:13px;color:var(--acc);font-weight:700;min-width:32px;}
.rest-x{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0 4px;}
.pickers-zone{background:#0e0e1a;border-radius:16px;padding:0 8px;display:flex;align-items:center;justify-content:center;}
.picker-col{flex:1;display:flex;flex-direction:column;align-items:center;}
.picker-lbl{font-size:10px;color:var(--t3);letter-spacing:3px;padding:10px 0 4px;}
.picker-wrap{position:relative;width:100%;height:308px;}
.picker{height:308px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.picker::-webkit-scrollbar{display:none;}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:22px;font-weight:600;color:#333;font-variant-numeric:tabular-nums;user-select:none;}
.picker-item.sel{color:var(--t1);font-size:30px;font-weight:800;}
.picker-item.near{color:#666;font-size:24px;}
.picker-grad-top{position:absolute;top:0;left:0;right:0;height:88px;background:linear-gradient(to bottom,#0e0e1a,transparent);pointer-events:none;z-index:2;}
.picker-grad-bot{position:absolute;bottom:0;left:0;right:0;height:88px;background:linear-gradient(to top,#0e0e1a,transparent);pointer-events:none;z-index:2;}
.picker-line{position:absolute;left:4px;right:4px;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);pointer-events:none;z-index:1;border-radius:8px;}
.picker-sep{font-size:28px;color:var(--t3);font-weight:300;padding:0 4px;margin-top:132px;}
.save-btn{width:100%;padding:18px;border-radius:14px;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:1px;transition:all .2s;border:none;}
.save-btn.ready{background:var(--acc);color:#fff;}
.save-btn.empty{background:#111;border:1px solid var(--border);color:var(--t3);}
.finish-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t3);border-radius:10px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;transition:all .2s;}
.finish-btn.hassets{background:var(--acc);border-color:var(--acc);color:#fff;}
.rest-btns{display:flex;gap:6px;}
.rest-btn{flex:1;padding:10px 0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-val{font-size:22px;font-weight:900;color:var(--acc);}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:2px;}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;margin-top:8px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;background:var(--acc);border-radius:4px 4px 0 0;opacity:.85;min-height:4px;}
.bar-lbl{font-size:9px;color:var(--t3);text-align:center;}
.ses-btn{width:100%;padding:14px 16px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.ses-btn:active{border-color:var(--blue);}
.day-pill{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:13px;cursor:pointer;font-family:inherit;color:var(--t2);}
.day-pill.on{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:700;}
.enh-pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;}
.pin-dots{display:flex;gap:16px;margin:16px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--border);transition:background .2s;}
.pin-dot.filled{background:var(--purple);}
.pin-pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:280px;}
.pin-key{padding:18px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--t1);}
.pin-key:active{opacity:.6;}
.inj-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.inj-card.done{border-color:var(--purple);background:#12091e;}
.inj-card.today{border-color:var(--acc);}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #111;}
.settings-lbl{font-size:14px;color:var(--t1);}
.settings-sub{font-size:11px;color:var(--t3);margin-top:3px;}
</style>
</head>

function makePicker(items,cur,onChange,fmt){
  var wrap=document.createElement('div');wrap.className='picker-wrap';
  var picker=document.createElement('div');picker.className='picker';
  var PAD=3;
  for(var i=0;i<PAD;i++){var p=document.createElement('div');p.className='picker-item';picker.appendChild(p);}
  items.forEach(function(v,i){var item=document.createElement('div');item.className='picker-item';item.textContent=fmt?fmt(v):v;picker.appendChild(item);});
  for(var i=0;i<PAD;i++){var p=document.createElement('div');p.className='picker-item';picker.appendChild(p);}
  var line=document.createElement('div');line.className='picker-line';
  var gt=document.createElement('div');gt.className='picker-grad-top';
  var gb=document.createElement('div');gb.className='picker-grad-bot';
  wrap.appendChild(line);wrap.appendChild(picker);wrap.appendChild(gt);wrap.appendChild(gb);
  var idx=items.findIndex(function(v){return Math.abs(v-cur)<0.01;});
  setTimeout(function(){picker.scrollTop=(idx>=0?idx:0)*44;updSel();},0);
  function updSel(){var si=Math.round(picker.scrollTop/44);picker.querySelectorAll('.picker-item').forEach(function(item,i){var ri=i-PAD;var diff=Math.abs(ri-si);item.classList.remove('sel','near');if(diff===0)item.classList.add('sel');else if(diff===1)item.classList.add('near');});if(si>=0&&si<items.length)onChange(items[si]);}
  var t;picker.addEventListener('scroll',function(){updSel();clearTimeout(t);t=setTimeout(function(){var si=Math.round(picker.scrollTop/44);picker.scrollTo({top:si*44,behavior:'smooth'});if(si>=0&&si<items.length)onChange(items[si]);},80);});
  return wrap;
}

function mkHdr(sub,title,backFn,accentSub){
  var h=el('div',{style:'padding:calc(var(--safe-top) + 88px) 16px 14px;display:flex;gap:12px;align-items:flex-start;border-bottom:1px solid #111;background:#0c0c18;flex-shrink:0;'});
  var b=el('button',{class:'back-btn',style:'margin-top:0;'});b.textContent='←';b.onclick=backFn;h.appendChild(b);
  var t=el('div');t.innerHTML='<div style="font-size:10px;color:'+(accentSub?'var(--acc)':'#555')+';letter-spacing:3px;">'+sub+'</div><div style="font-size:22px;font-weight:900;">'+title+'</div>';
  h.appendChild(t);return h;
}

function renderSetup(wrap){
  var div=el('div',{style:'flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;gap:16px;'});
  div.innerHTML='<div style="font-size:36px;margin-bottom:8px;">🏋️</div><div style="font-size:26px;font-weight:900;margin-bottom:4px;">IronLog</div><div style="font-size:13px;color:var(--t3);line-height:1.6;margin-bottom:8px;">Configure la sync Google Sheets pour ne jamais perdre tes données.</div><label class="lbl-sm">URL APPS SCRIPT</label><input id="ui" class="inp" placeholder="https://script.google.com/macros/s/..." value="'+SHEET_URL+'"><button id="sb" class="big-btn primary">CONNECTER ›</button><button id="sk" style="background:none;border:none;color:var(--t3);font-family:inherit;font-size:13px;cursor:pointer;padding:8px;text-align:center;">Continuer sans sync →</button>';
  div.querySelector('#sb').onclick=function(){var url=div.querySelector('#ui').value.trim();if(!url)return;SHEET_URL=url;localStorage.setItem('ironlog-sheeturl',url);syncSheets(S.sessions,S.prs);S.view='log';render();};
  div.querySelector('#sk').onclick=function(){SHEET_URL='skip';localStorage.setItem('ironlog-sheeturl','skip');S.view='log';render();};
  wrap.appendChild(div);
}

function renderLog(wrap){
  if(S.step==='muscle')renderMuscle(wrap);
  else if(S.step==='exo')renderExo(wrap);
  else if(S.step==='variant')renderVariant(wrap);
  else if(S.step==='logging')renderLogging(wrap);
}

function renderMuscle(wrap){
  var scroll=el('div',{class:'scroll pad-top'});
  scroll.appendChild(elt('div','IRON LOG',{style:'font-size:10px;color:#444;letter-spacing:5px;margin-bottom:4px;'}));
  scroll.appendChild(elt('h2','Muscle ?'));
  var atc=S.trainingCycles.find(function(c){return c.id===S.activeTrainingCycle;});
  if(atc){
    var ind=el('div',{style:'background:#0a0f1a;border:1px solid var(--blue);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;'});
    ind.innerHTML='<div><div style="font-size:10px;color:var(--blue);letter-spacing:2px;">CYCLE ACTIF</div><div style="font-size:13px;font-weight:700;color:#fff;">'+atc.name+'</div></div>';
    var sb=el('button',{style:'background:var(--blue);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;'});
    sb.textContent='SÉANCE ›';sb.onclick=function(){S.view='cycle';S.cycleView='active';render();};
    ind.appendChild(sb);scroll.appendChild(ind);
  } else {
    var ss=elt('div',S.lastSync?'✓ Sync '+new Date(S.lastSync).toLocaleDateString('fr'):(S.pendingSync.length?'⏳ '+S.pendingSync.length+' en attente':''),{style:'font-size:11px;color:#444;margin-bottom:16px;'});
    scroll.appendChild(ss);
  }
  var grid=el('div',{class:'muscle-grid'});
  MUSCLES.forEach(function(m){
    var b=el('button',{class:'muscle-btn'});
    b.innerHTML='<div style="font-size:28px;margin-bottom:8px;">'+m.emoji+'</div><div style="font-weight:700;font-size:16px;">'+m.label+'</div><div style="font-size:11px;color:var(--t3);margin-top:3px;">'+EXO[m.id].length+' exercices</div>';
    b.onclick=function(){S.selMuscle=m;S.step='exo';render();};
    grid.appendChild(b);
  });
  scroll.appendChild(grid);wrap.appendChild(scroll);
}

function renderExo(wrap){
  var m=S.selMuscle;
  wrap.appendChild(mkHdr(m.label.toUpperCase(),'Exercice ?',function(){S.step='muscle';render();}));
  var scroll=el('div',{class:'scroll',style:'padding-top:12px;'});
  EXO[m.id].forEach(function(ex){
    var b=el('button',{class:'list-btn'});
    b.innerHTML='<div style="font-weight:600;font-size:15px;color:var(--t1);">'+ex.n+'</div><div style="color:var(--t3);font-size:12px;flex-shrink:0;margin-left:10px;">'+ex.v.length+' ›</div>';
    b.onclick=function(){S.selExo=ex;S.step='variant';render();};
    scroll.appendChild(b);
  });
  wrap.appendChild(scroll);
}

function renderVariant(wrap){
  var ex=S.selExo;
  wrap.appendChild(mkHdr(ex.n.toUpperCase(),'Variante ?',function(){S.step='exo';render();},true));
  var scroll=el('div',{class:'scroll',style:'padding-top:12px;'});
  ex.v.forEach(function(v){
    var key=ex.n+' — '+v;var pr=S.prs[key];var last=S.sessions.find(function(s){return s.exercise===key;});
    var b=el('button',{class:'list-btn',style:'flex-direction:column;align-items:flex-start;'});
    var row=el('div',{style:'display:flex;justify-content:space-between;align-items:center;width:100%;'});
    row.innerHTML='<span style="font-size:15px;font-weight:500;color:var(--t1);">'+v+'</span>'+(pr?'<span class="pr-badge">PR '+pr+'kg</span>':'');
    b.appendChild(row);
    if(last)b.appendChild(elt('div','Dernière : '+last.sets.map(function(s){return s.reps+'×'+s.weight;}).join('  '),{style:'font-size:11px;color:var(--t3);margin-top:4px;'}));
    b.onclick=function(){S.selVariant=v;if(last&&last.sets.length)S.weight=last.sets[last.sets.length-1].weight;S.sets=[];S.reps=8;S.step='logging';render();};
    scroll.appendChild(b);
  });
  wrap.appendChild(scroll);
}

function renderLogging(wrap){
  var ex=S.selExo,v=S.selVariant,m=S.selMuscle;
  var hdr=el('div',{class:'log-header'});
  var top=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;'});
  var info=el('div',{style:'flex:1;margin-right:12px;'});
  info.innerHTML='<div style="font-size:10px;color:var(--t2);letter-spacing:2px;">'+m.label.toUpperCase()+'</div><div style="font-size:15px;font-weight:800;">'+ex.n+'</div><div style="font-size:12px;color:var(--acc);margin-top:2px;">'+v+'</div>';
  var fin=el('button',{class:'finish-btn'+(S.sets.length?' hassets':'')});fin.textContent='FINIR ✓';fin.onclick=finishSession;
  top.appendChild(info);top.appendChild(fin);hdr.appendChild(top);
  if(S.sets.length){
    var chips=el('div',{class:'chips'});
    S.sets.forEach(function(s,i){var c=el('div',{class:'chip'+(i===S.flashIdx?' flash':'')});c.textContent='S'+(i+1)+' · '+s.reps+'×'+s.weight;chips.appendChild(c);});
    var nx=elt('div','S'+(S.sets.length+1),{class:'chip next'});chips.appendChild(nx);hdr.appendChild(chips);
  }
  if(S.restSecs>0){
    var rb=el('div',{class:'rest-bar'});
    var tr=el('div',{class:'rest-track'});var fi=el('div',{class:'rest-fill',id:'rf',style:'width:'+Math.round((S.restSecs/S.restDur)*100)+'%'});tr.appendChild(fi);
    var rt=elt('div',S.restSecs+'s',{class:'rest-time',id:'rt'});
    var rx=el('button',{class:'rest-x'});rx.textContent='×';rx.onclick=function(){clearInterval(restIv);S.restSecs=0;render();};
    rb.appendChild(tr);rb.appendChild(rt);rb.appendChild(rx);hdr.appendChild(rb);
  }
  wrap.appendChild(hdr);
  var scroll=el('div',{class:'scroll',style:'padding-top:16px;display:flex;flex-direction:column;gap:14px;'});
  var zone=el('div',{class:'pickers-zone'});
  var rc=el('div',{class:'picker-col'});rc.appendChild(elt('div','REPS',{class:'picker-lbl'}));
  rc.appendChild(makePicker(REPS,S.reps,function(val){S.reps=val;updSB();},function(v){return String(v);}));zone.appendChild(rc);
  var sep=elt('div','×',{class:'picker-sep'});zone.appendChild(sep);
  var wc=el('div',{class:'picker-col',style:'flex:1.6;'});wc.appendChild(elt('div','CHARGE (kg)',{class:'picker-lbl'}));
  wc.appendChild(makePicker(WEIGHTS,S.weight,function(val){S.weight=val;updSB();},function(v){return Number.isInteger(v)?String(v):String(v);}));zone.appendChild(wc);
  scroll.appendChild(zone);
  var sv=el('button',{class:'save-btn'+(S.reps&&S.weight?' ready':' empty'),id:'save-btn'});
  sv.textContent=S.sets.length===0?'VALIDER SET 1':'+ SET '+(S.sets.length+1);sv.onclick=saveSet;scroll.appendChild(sv);
  var rbs=el('div',{class:'rest-btns'});
  [60,90,120,180].forEach(function(s){var b=el('button',{class:'rest-btn'});b.textContent='⏱ '+s+'s';b.onclick=function(){startRest(s);};rbs.appendChild(b);});
  scroll.appendChild(rbs);wrap.appendChild(scroll);
}

function renderHistory(wrap){
  var scroll=el('div',{class:'scroll pad-top'});
  scroll.appendChild(elt('h2','Séances'));
  scroll.appendChild(elt('div',S.sessions.length+' enregistrées',{class:'page-sub'}));
  if(!S.sessions.length){scroll.appendChild(elt('div','Aucune séance encore 💪',{style:'text-align:center;color:#333;padding:60px 0;'}));return wrap.appendChild(scroll);}
  S.sessions.forEach(function(s){
    var c=el('div',{class:'card-sm'});var pend=S.pendingSync.find(function(p){return p.id===s.id;});
    c.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><div style="flex:1;margin-right:10px;"><div style="font-weight:700;font-size:14px;line-height:1.3;">'+s.exercise+'</div><div style="font-size:11px;color:var(--t3);margin-top:3px;">'+s.date+' · '+s.muscle+' '+(pend?'<span style="color:var(--acc);">⏳</span>':'<span style="color:var(--green);">✓</span>')+'</div></div><div style="text-align:right;flex-shrink:0;"><div style="color:var(--acc);font-weight:900;font-size:18px;">'+s.estimated1RM+'kg</div><div style="font-size:10px;color:var(--t3);">1RM est.</div></div></div><div style="display:flex;flex-wrap:wrap;gap:5px;">'+s.sets.map(function(x){return '<div style="background:#1a1a28;border-radius:7px;padding:4px 10px;font-size:12px;color:#888;">'+x.reps+'×'+x.weight+'kg</div>';}).join('')+'</div><div style="margin-top:8px;font-size:11px;color:var(--t3);">Vol. '+s.totalVolume.toLocaleString()+' kg</div>';
    scroll.appendChild(c);
  });
  wrap.appendChild(scroll);
}

function renderStats(wrap){
  var scroll=el('div',{class:'scroll pad-top'});
  scroll.appendChild(elt('h2','Stats'));
  var vol=S.sessions.reduce(function(a,s){return a+s.totalVolume;},0);
  var grid=el('div',{class:'stat-grid'});
  [{l:'Séances',v:S.sessions.length},{l:'Volume',v:(vol/1000).toFixed(1)+'t'},{l:'PRs',v:Object.keys(S.prs).length}].forEach(function(x){
    var b=el('div',{class:'stat-box'});b.innerHTML='<div class="stat-val">'+x.v+'</div><div class="stat-lbl">'+x.l.toUpperCase()+'</div>';grid.appendChild(b);
  });
  scroll.appendChild(grid);
  var pc=el('div',{class:'card'});pc.appendChild(elt('div','🏆 RECORDS PERSO',{class:'sec-lbl'}));
  var prs=Object.entries(S.prs).sort(function(a,b){return b[1]-a[1];}).slice(0,12);
  if(!prs.length)pc.appendChild(elt('div','Aucun PR encore',{style:'color:var(--t3);text-align:center;padding:16px 0;'}));
  prs.forEach(function(kv){var row=el('div',{style:'display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #111;'});row.innerHTML='<div style="font-size:13px;color:#ccc;flex:1;margin-right:8px;line-height:1.3;">'+kv[0]+'</div><div style="color:var(--acc);font-weight:900;font-size:16px;flex-shrink:0;">'+kv[1]+'kg</div>';pc.appendChild(row);});
  scroll.appendChild(pc);
  if(S.sessions.length>1){
    var byD={};S.sessions.forEach(function(s){byD[s.date]=(byD[s.date]||0)+s.totalVolume;});
    var data=Object.entries(byD).sort(function(a,b){return a[0].localeCompare(b[0]);}).slice(-10);
    var mx=Math.max.apply(null,data.map(function(d){return d[1];}));
    var cc=el('div',{class:'card'});cc.appendChild(elt('div','VOLUME PAR SÉANCE',{class:'sec-lbl'}));
    var chart=el('div',{class:'bar-chart'});
    data.forEach(function(dv){var w=el('div',{class:'bar-wrap'});var bar=el('div',{class:'bar'});bar.style.height=Math.round((dv[1]/mx)*90)+'px';w.appendChild(bar);w.appendChild(elt('div',dv[0].slice(5),{class:'bar-lbl'}));chart.appendChild(w);});
    cc.appendChild(chart);scroll.appendChild(cc);
  }
  wrap.appendChild(scroll);
}

// ═══ CYCLE ENTRAÎNEMENT ═══
function renderCycle(wrap){
  if(S.cycleView==='home')renderCycleHome(wrap);
  else if(S.cycleView==='create')renderCycleCreate(wrap);
  else if(S.cycleView==='pickMuscle'||S.cycleView==='pickExo'||S.cycleView==='pickVariant')renderCyclePick(wrap);
  else if(S.cycleView==='active')renderCycleActive(wrap);
  else if(S.cycleView==='session')renderCycleSession(wrap);
  else if(S.cycleView==='stats')renderCycleStats(wrap);
}

function renderCycleHome(wrap){
  var scroll=el('div',{class:'scroll pad-top'});
  scroll.appendChild(elt('h2','Cycles'));
  scroll.appendChild(elt('div','Programmes d\'entraînement',{class:'page-sub'}));
  var atc=S.trainingCycles.find(function(c){return c.id===S.activeTrainingCycle;});
  if(atc){
    var card=el('div',{class:'card',style:'border-color:var(--blue);background:#080f1a;margin-bottom:16px;'});
    card.innerHTML='<div style="font-size:10px;color:var(--blue);letter-spacing:3px;margin-bottom:6px;">CYCLE ACTIF</div><div style="font-size:20px;font-weight:900;">'+atc.name+'</div><div style="font-size:12px;color:var(--t3);margin-top:4px;">Démarré le '+fmtD(atc.startDate)+' · '+atc.sessions.length+' séances types</div>';
    var btns=el('div',{style:'display:flex;gap:8px;margin-top:12px;'});
    var sb=el('button',{style:'flex:1;padding:12px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;'});sb.textContent='FAIRE UNE SÉANCE ›';sb.onclick=function(){S.cycleView='active';render();};
    var eb=el('button',{style:'padding:12px 14px;background:#1a1a2a;border:1px solid var(--border);border-radius:10px;color:var(--t3);font-family:inherit;font-size:12px;cursor:pointer;'});eb.textContent='Terminer';
    eb.onclick=function(){if(confirm('Terminer ce cycle ?')){S.activeTrainingCycle=null;saveLocal();render();}};
    btns.appendChild(sb);btns.appendChild(eb);card.appendChild(btns);scroll.appendChild(card);
  }
  var nb=el('button',{class:'big-btn blue'});nb.textContent='+ NOUVEAU CYCLE';nb.onclick=function(){S._newCycle={name:'',sessions:[]};S.cycleView='create';render();};scroll.appendChild(nb);
  S.trainingCycles.filter(function(c){return c.id!==S.activeTrainingCycle;}).forEach(function(c){
    var card=el('div',{class:'card-sm'});
    card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:15px;">'+c.name+'</div><div style="font-size:11px;color:var(--t3);margin-top:3px;">'+fmtD(c.startDate)+' · '+c.sessions.length+' séances</div></div></div>';
    var ab=el('button',{style:'padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-family:inherit;font-size:11px;cursor:pointer;margin-top:8px;'});ab.textContent='Activer';
    ab.onclick=function(){S.activeTrainingCycle=c.id;saveLocal();S.cycleView='active';render();};card.appendChild(ab);scroll.appendChild(card);
  });
  wrap.appendChild(scroll);
}

function renderCycleCreate(wrap){
  var nc=S._newCycle;
  wrap.appendChild(mkHdr('CYCLE','Nouveau cycle',function(){S.cycleView='home';render();}));
  var scroll=el('div',{class:'scroll',style:'padding-top:16px;'});
  scroll.appendChild(elt('label','NOM DU CYCLE',{class:'lbl-sm'}));
  var ni=el('input',{class:'inp',placeholder:'Ex: Force Automne 2025'});ni.value=nc.name;ni.oninput=function(e){nc.name=e.target.value;};scroll.appendChild(ni);
  var sh=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;'});
  sh.appendChild(elt('div','SÉANCES TYPE',{class:'sec-lbl',style:'margin-bottom:0;'}));
  var asb=el('button',{style:'background:var(--bg3);border:1px solid var(--border);color:var(--t2);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;cursor:pointer;'});asb.textContent='+ Séance';
  asb.onclick=function(){nc.sessions.push({id:Date.now(),name:'Séance '+String.fromCharCode(65+nc.sessions.length),exos:[]});render();};
  sh.appendChild(asb);scroll.appendChild(sh);
  nc.sessions.forEach(function(ses,si){
    var sc=el('div',{class:'card',style:'margin-bottom:10px;'});
    var st=el('div',{style:'display:flex;gap:8px;align-items:center;margin-bottom:12px;'});
    var sni=el('input',{class:'inp',style:'flex:1;margin-bottom:0;',placeholder:'Nom'});sni.value=ses.name;sni.oninput=function(e){ses.name=e.target.value;};
    var db=el('button',{style:'background:#1a0a0a;border:1px solid #3a1a1a;color:var(--red);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:16px;cursor:pointer;'});db.textContent='×';
    db.onclick=function(){nc.sessions.splice(si,1);render();};
    st.appendChild(sni);st.appendChild(db);sc.appendChild(st);
    ses.exos.forEach(function(exo,ei){
      var er=el('div',{style:'background:#0a0a14;border-radius:10px;padding:10px;margin-bottom:8px;'});
      var et=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;'});
      et.appendChild(elt('div',exo.name,{style:'font-size:13px;font-weight:700;'}));
      var deb=el('button',{style:'background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;'});deb.textContent='×';deb.onclick=function(){ses.exos.splice(ei,1);render();};et.appendChild(deb);er.appendChild(et);
      var dr=el('div',{style:'display:flex;gap:8px;align-items:flex-end;'});
      [['SÉRIES','sets',3,56],['REPS','reps',10,56],['REPOS (s)','rest',90,72]].forEach(function(f){
        var fd=el('div');fd.appendChild(elt('div',f[0],{class:'lbl-sm'}));
        var inp=el('input',{type:'number',style:'width:'+f[3]+'px;background:#111;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--t1);font-family:inherit;font-size:14px;text-align:center;'});
        inp.value=exo[f[1]];inp.oninput=function(e){exo[f[1]]=parseInt(e.target.value)||f[2];};fd.appendChild(inp);dr.appendChild(fd);
      });
      er.appendChild(dr);sc.appendChild(er);
    });
    var aeb=el('button',{style:'width:100%;padding:10px;background:none;border:1px dashed var(--border);border-radius:10px;color:var(--t3);font-family:inherit;font-size:12px;cursor:pointer;'});aeb.textContent='+ Ajouter un exercice';
    aeb.onclick=function(){S._pickExoSesIdx=si;S._pickExoMuscle=null;S._pickExoExo=null;S.cycleView='pickMuscle';render();};
    sc.appendChild(aeb);scroll.appendChild(sc);
  });
  var sv=el('button',{class:'big-btn blue',style:'margin-top:8px;'});sv.textContent='CRÉER LE CYCLE';
  sv.onclick=function(){
    if(!nc.name||!nc.sessions.length){alert('Donne un nom et au moins une séance !');return;}
    var cycle={id:Date.now(),name:nc.name,startDate:today(),sessions:nc.sessions,log:[]};
    S.trainingCycles.push(cycle);S.activeTrainingCycle=cycle.id;S._newCycle=null;saveLocal();S.cycleView='active';render();
  };
  scroll.appendChild(sv);wrap.appendChild(scroll);
}

function renderCyclePick(wrap){
  if(S.cycleView==='pickMuscle'){
    wrap.appendChild(mkHdr('CYCLE','Quel muscle ?',function(){S.cycleView='create';render();}));
    var scroll=el('div',{class:'scroll',style:'padding-top:12px;'});
    MUSCLES.forEach(function(m){
      var b=el('button',{class:'list-btn'});
      b.innerHTML='<div style="font-weight:600;font-size:15px;">'+m.emoji+' '+m.label+'</div><div style="color:var(--t3);font-size:12px;">'+EXO[m.id].length+' ›</div>';
      b.onclick=function(){S._pickExoMuscle=m;S.cycleView='pickExo';render();};scroll.appendChild(b);
    });
    wrap.appendChild(scroll);
  } else if(S.cycleView==='pickExo'){
    wrap.appendChild(mkHdr(S._pickExoMuscle.label,'Exercice ?',function(){S.cycleView='pickMuscle';render();}));
    var scroll=el('div',{class:'scroll',style:'padding-top:12px;'});
    EXO[S._pickExoMuscle.id].forEach(function(ex){
      var b=el('button',{class:'list-btn'});
      b.innerHTML='<div style="font-weight:600;font-size:15px;">'+ex.n+'</div><div style="color:var(--t3);font-size:12px;">'+ex.v.length+' ›</div>';
      b.onclick=function(){S._pickExoExo=ex;S.cycleView='pickVariant';render();};scroll.appendChild(b);
    });
    wrap.appendChild(scroll);
  } else {
    wrap.appendChild(mkHdr(S._pickExoExo.n,'Variante ?',function(){S.cycleView='pickExo';render();},true));
    var scroll=el('div',{class:'scroll',style:'padding-top:12px;'});
    S._pickExoExo.v.forEach(function(v){
      var b=el('button',{class:'list-btn'});b.appendChild(elt('span',v,{style:'font-size:15px;font-weight:500;color:var(--t1);'}));
      b.onclick=function(){
        var si=S._pickExoSesIdx;
        S._newCycle.sessions[si].exos.push({name:S._pickExoExo.n+' — '+v,sets:3,reps:10,rest:90});
        S._pickExoMuscle=null;S._pickExoExo=null;S.cycleView='create';render();
      };
      scroll.appendChild(b);
    });
    wrap.appendChild(scroll);

function drawCurve(points,key,label,color){
  var wrap=el('div',{style:'margin-bottom:12px;'});
  wrap.appendChild(elt('div',label,{style:'font-size:9px;color:var(--t3);letter-spacing:3px;margin-bottom:8px;'}));

  var vals=points.map(function(p){return p[key];});
  var min=Math.min.apply(null,vals);
  var max=Math.max.apply(null,vals);
  var range=max-min||1;
  var H=80;var W=100;

  // SVG
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('style','width:100%;height:80px;overflow:visible;');

  // Grid lines
  [0,0.5,1].forEach(function(t){
    var y=H-t*H;
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0');line.setAttribute('x2',String(W));
    line.setAttribute('y1',String(y));line.setAttribute('y2',String(y));
    line.setAttribute('stroke','#1e1e2e');line.setAttribute('stroke-width','0.5');
    svg.appendChild(line);
  });

  // Build path
  var pathD='';
  var areaD='';
  points.forEach(function(p,i){
    var x=points.length===1?W/2:i*(W/(points.length-1));
    var y=H-((p[key]-min)/range)*(H*0.85)-H*0.075;
    if(i===0){pathD='M'+x.toFixed(1)+','+y.toFixed(1);areaD='M'+x.toFixed(1)+','+H+' L'+x.toFixed(1)+','+y.toFixed(1);}
    else{pathD+=' L'+x.toFixed(1)+','+y.toFixed(1);areaD+=' L'+x.toFixed(1)+','+y.toFixed(1);}
  });
  // Close area
  var lastX=((points.length-1)*(W/(points.length-1||1))).toFixed(1);
  areaD+=' L'+lastX+','+H+' Z';

  // Area fill
  var area=document.createElementNS('http://www.w3.org/2000/svg','path');
  area.setAttribute('d',areaD);
  area.setAttribute('fill',color);area.setAttribute('opacity','0.08');
  svg.appendChild(area);

  // Line
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',pathD);
  path.setAttribute('fill','none');path.setAttribute('stroke',color);
  path.setAttribute('stroke-width','1.5');path.setAttribute('stroke-linecap','round');path.setAttribute('stroke-linejoin','round');
  svg.appendChild(path);

  // Dots + labels
  points.forEach(function(p,i){
    var x=points.length===1?W/2:i*(W/(points.length-1));
    var y=H-((p[key]-min)/range)*(H*0.85)-H*0.075;
    var circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x.toFixed(1));circle.setAttribute('cy',y.toFixed(1));
    circle.setAttribute('r','2.5');circle.setAttribute('fill',color);
    svg.appendChild(circle);
    // Value label on last and first
    if(i===0||i===points.length-1){
      var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',x.toFixed(1));txt.setAttribute('y',(y-6).toFixed(1));
      txt.setAttribute('text-anchor',i===0?'start':'end');
      txt.setAttribute('fill',color);txt.setAttribute('font-size','7');txt.setAttribute('font-weight','700');
      txt.textContent=p[key]+(key==='avgWeight'?'kg':'');
      svg.appendChild(txt);
    }
  });

  // X axis labels (dates)
  var xaxis=el('div',{style:'display:flex;justify-content:space-between;margin-top:4px;'});
  points.forEach(function(p,i){
    if(i===0||i===points.length-1||points.length<=4){
      var lbl=elt('div',p.date.slice(5),{style:'font-size:9px;color:var(--t3);'});
      xaxis.appendChild(lbl);
    }
  });

  wrap.appendChild(svg);
  wrap.appendChild(xaxis);
  return wrap;
}

  ne.products.forEach(function(p,pi){
    var pc=el('div',{style:'background:#0a0a14;border-radius:12px;padding:12px;margin-bottom:10px;'});
    var r1=el('div',{style:'display:flex;gap:8px;margin-bottom:8px;'});
    var ni=el('input',{class:'inp',style:'flex:2;margin-bottom:0;',placeholder:'Produit (ex: Testostérone E)'});ni.value=p.name;ni.oninput=function(e){p.name=e.target.value;};
    var di=el('input',{class:'inp',style:'flex:1;margin-bottom:0;',placeholder:'Dose'});di.value=p.dose;di.oninput=function(e){p.dose=e.target.value;};
    var us=el('select',{style:'background:#111;border:1px solid var(--border);border-radius:10px;padding:12px 6px;color:var(--t1);font-family:inherit;font-size:13px;flex:1;'});
    ['mg','mcg','UI'].forEach(function(u){var o=el('option');o.value=u;o.textContent=u;if(p.unit===u)o.selected=true;us.appendChild(o);});
    us.onchange=function(e){p.unit=e.target.value;};
    r1.appendChild(ni);r1.appendChild(di);r1.appendChild(us);pc.appendChild(r1);
    var fr=el('div',{style:'display:flex;gap:6px;'});
    ['injection','oral','autre'].forEach(function(f){
      var fb=el('button',{style:'flex:1;padding:8px;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;font-weight:700;background:'+(p.form===f?'var(--purple)':'var(--bg3)')+';border:1px solid '+(p.form===f?'var(--purple)':'var(--border)')+';color:'+(p.form===f?'#fff':'var(--t2)')+';'});
      fb.textContent=f.charAt(0).toUpperCase()+f.slice(1);fb.onclick=function(){p.form=f;render();};fr.appendChild(fb);
    });
    pc.appendChild(fr);scroll.appendChild(pc);
  });
  var apb=el('button',{style:'width:100%;padding:10px;background:none;border:1px dashed var(--border);border-radius:10px;color:var(--t3);font-family:inherit;font-size:12px;cursor:pointer;margin-bottom:16px;'});apb.textContent='+ Ajouter un produit';
  apb.onclick=function(){ne.products.push({name:'',dose:'',unit:'mg',form:'injection'});render();};scroll.appendChild(apb);
  scroll.appendChild(elt('div','DURÉE ET DATE',{class:'sec-lbl'}));
  var dr=el('div',{style:'display:flex;gap:10px;margin-bottom:10px;'});
  var wl=el('div',{style:'flex:1;'});wl.appendChild(elt('label','SEMAINES',{class:'lbl-sm'}));
  var wi=el('input',{class:'inp',type:'number',style:'margin-bottom:0;'});wi.value=ne.weeks;wi.oninput=function(e){ne.weeks=parseInt(e.target.value)||12;};wl.appendChild(wi);
  var sl=el('div',{style:'flex:1;'});sl.appendChild(elt('label','DATE DÉBUT',{class:'lbl-sm'}));
  var si=el('input',{class:'inp',type:'date',style:'margin-bottom:0;'});si.value=ne.startDate;si.oninput=function(e){ne.startDate=e.target.value;};sl.appendChild(si);
  dr.appendChild(wl);dr.appendChild(sl);scroll.appendChild(dr);
  var hasInj=ne.products.some(function(p){return p.form==='injection';});
  if(hasInj){
    scroll.appendChild(elt('div','JOURS D\'INJECTION',{class:'sec-lbl',style:'margin-top:12px;'}));
    var dp=el('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;'});
    DAYS.forEach(function(d,i){
      var b=el('button',{class:'day-pill'+(ne.freqDays.includes(i)?' on':'')});b.textContent=d;
      b.onclick=function(){var idx=ne.freqDays.indexOf(i);if(idx>=0)ne.freqDays.splice(idx,1);else ne.freqDays.push(i);render();};dp.appendChild(b);
    });
    scroll.appendChild(dp);
  }
  var sv=el('button',{class:'big-btn purple'});sv.textContent='CRÉER LE CYCLE';
  sv.onclick=async function(){
    if(!ne.products[0].name){alert('Ajoute au moins un produit !');return;}
    var injections=[];
    if(hasInj&&ne.freqDays.length>0){
      var start=new Date(ne.startDate);var end=new Date(ne.startDate);end.setDate(end.getDate()+ne.weeks*7);var cur=new Date(start);
      while(cur<=end){var dow=(cur.getDay()+6)%7;if(ne.freqDays.includes(dow)){injections.push({id:Date.now()+injections.length,date:cur.toISOString().split('T')[0],done:false,products:ne.products.map(function(p){return {name:p.name,dose:p.dose,unit:p.unit};})});}cur.setDate(cur.getDate()+1);}
    }
    var cycle={id:Date.now(),products:ne.products,weeks:ne.weeks,startDate:ne.startDate,freqDays:ne.freqDays,injections:injections};
    S.enhCycles.push(cycle);S.activeEnhCycle=cycle.id;S._newEnh=null;saveLocal();
    await reqNotif();
    var nextInj=injections.find(function(i){return i.date>=today();});
    if(nextInj)schedNotif(nextInj.date,ne.products.map(function(p){return p.name;}).join('+'));
    S.enhView='detail';render();
  };
  scroll.appendChild(sv);wrap.appendChild(scroll);
}

function renderEnhDetail(wrap){
  var cyc=S.enhCycles.find(function(c){return c.id===S.activeEnhCycle;});
  if(!cyc){S.enhView='home';render();return;}
  wrap.appendChild(mkHdr('ENHANCEMENT','Calendrier',function(){S.enhView='home';render();}));
  var scroll=el('div',{class:'scroll',style:'padding-top:16px;'});
  var ps=el('div',{class:'card',style:'border-color:var(--purple);'});
  ps.appendChild(elt('div','PROTOCOLE',{class:'sec-lbl'}));
  cyc.products.forEach(function(p){var row=el('div',{style:'display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #111;'});row.innerHTML='<div style="font-weight:700;">'+p.name+'</div><div style="color:var(--purple);font-weight:700;">'+p.dose+' '+p.unit+' <span style="color:var(--t3);font-weight:400;">'+p.form+'</span></div>';ps.appendChild(row);});
  scroll.appendChild(ps);
  var done=(cyc.injections||[]).filter(function(i){return i.done;}).length;var total=(cyc.injections||[]).length;
  var sg=el('div',{class:'stat-grid'});
  [{l:'Total',v:total},{l:'Faites',v:done},{l:'Restantes',v:total-done}].forEach(function(x){var b=el('div',{class:'stat-box'});b.innerHTML='<div class="stat-val" style="color:var(--purple);">'+x.v+'</div><div class="stat-lbl">'+x.l.toUpperCase()+'</div>';sg.appendChild(b);});
  scroll.appendChild(sg);
  // Export to calendar button
  var expCal=el('button',{style:'width:100%;padding:13px;background:#0a0a1a;border:1px solid var(--purple);border-radius:12px;color:var(--purple);font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:16px;letter-spacing:1px;'});
  expCal.textContent='📅 EXPORTER VERS CALENDRIER IPHONE';
  expCal.onclick=function(){exportInjToCalendar(cyc);};
  scroll.appendChild(expCal);
  scroll.appendChild(elt('div','CALENDRIER DES INJECTIONS',{class:'sec-lbl'}));
  if(!cyc.injections||!cyc.injections.length){scroll.appendChild(elt('div','Aucune injection planifiée',{style:'color:var(--t3);text-align:center;padding:20px 0;'}));}
  else{
    cyc.injections.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(inj){
      var isToday=inj.date===today();var isPast=inj.date<today();
      var div=el('div',{class:'inj-card'+(inj.done?' done':isToday?' today':'')});
      var info=el('div');
      info.innerHTML='<div style="font-weight:700;font-size:14px;color:'+(inj.done?'var(--purple)':isToday?'var(--acc)':'var(--t1)')+';">'+(inj.done?'✓ ':isToday?'💉 ':'')+fmtD(inj.date)+'</div><div style="font-size:11px;color:var(--t3);margin-top:3px;">'+inj.products.map(function(p){return p.name+' '+p.dose+p.unit;}).join(' + ')+'</div>';
      div.appendChild(info);
      if(!inj.done){
        var btn=el('button',{style:'padding:8px 14px;border-radius:8px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:'+(isToday?'var(--purple)':'var(--bg3)')+';color:'+(isToday?'#fff':'var(--t2)')+';'+(isToday?'':' border:1px solid var(--border);')});
        btn.textContent=isToday?'FAIT ✓':'Marquer';
        var injId=inj.id;var cycId=cyc.id;btn.onclick=function(){markInjDone(cycId,injId);};div.appendChild(btn);
      }
      scroll.appendChild(div);
    });
  }
  wrap.appendChild(scroll);
}

function exportInjToCalendar(cyc){
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//IronLog//FR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  (cyc.injections||[]).forEach(function(inj){
    if(inj.done) return;
    var d=inj.date.replace(/-/g,'');
    var prodStr=inj.products.map(function(p){return p.name+' '+p.dose+p.unit;}).join(' + ');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:ironlog-inj-'+inj.id+'@ironlog');
    lines.push('DTSTART;VALUE=DATE:'+d);
    lines.push('DTEND;VALUE=DATE:'+d);
    lines.push('SUMMARY:💉 Injection — '+prodStr);
    lines.push('DESCRIPTION:'+prodStr+'\nIronLog — Enhancement');
    lines.push('ALARM;TRIGGER:T080000');
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT0M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:💉 Injection aujourd\'hui — '+prodStr);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var ics=lines.join('\r\n');
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='injections-ironlog.ics';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function markInjDone(cycId,injId){
  var cyc=S.enhCycles.find(function(c){return c.id==cycId;});if(!cyc)return;
  var inj=cyc.injections.find(function(i){return i.id==injId;});if(inj){inj.done=true;inj.doneAt=new Date().toISOString();}
  saveLocal();
  var next=cyc.injections.find(function(i){return !i.done&&i.date>today();});
  if(next)schedNotif(next.date,cyc.products.map(function(p){return p.name;}).join('+'));
  render();
}

// ═══ SETTINGS ═══

  var scroll=el('div',{class:'scroll pad-top'});scroll.appendChild(elt('h2','Réglages'));
  var card=el('div',{class:'card'});
  card.innerHTML='<div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #111;"><div><div style="font-size:14px;">Google Sheets</div><div style="font-size:11px;color:var(--t3);margin-top:3px;">'+(S.lastSync?'Sync '+new Date(S.lastSync).toLocaleString('fr'):'Jamais synchronisé')+'</div></div></div>';
  var inp=el('input',{class:'inp',placeholder:'URL Apps Script',style:'margin:12px 0;'});card.appendChild(inp);
  var sb=el('button',{class:'big-btn primary',style:'margin-bottom:0;'});sb.textContent='SYNC MAINTENANT';sb.onclick=function(){var v=inp.value.trim();if(v){SHEET_URL=v;localStorage.setItem('ironlog-sheeturl',v);}syncSheets(S.sessions,S.prs);};card.appendChild(sb);

  var expBtn=el('button',{style:'width:100%;padding:14px;background:#0a1a0a;border:1px solid var(--green);border-radius:12px;color:var(--green);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;'});
  expBtn.textContent='📤 EXPORTER MES DONNÉES';
  expBtn.onclick=function(){
    var exportData={
      exportDate:new Date().toISOString(),
      summary:{
        totalSessions:S.sessions.length,
        totalPRs:Object.keys(S.prs).length,
        totalCycles:S.trainingCycles.length,
      },
      sessions:S.sessions.map(function(s){return {
        date:s.date,muscle:s.muscle,exercise:s.exercise,
        sets:s.sets,estimated1RM:s.estimated1RM,totalVolume:s.totalVolume
      };}),
      prs:S.prs,
      trainingCycles:S.trainingCycles.map(function(c){return {
        name:c.name,startDate:c.startDate,
        sessions:c.sessions.map(function(ses){return {name:ses.name,exos:ses.exos.map(function(e){return {name:e.name,sets:e.sets,reps:e.reps,rest:e.rest};})};} ),
        log:(c.log||[]).map(function(l){return {date:l.date,sessionName:l.sessionName,sets:l.sets};})
      };}),
    };
    var json=JSON.stringify(exportData,null,2);

    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  expCard.appendChild(expBtn);

  var info=el('div',{class:'card',style:'margin-top:0;'});
  info.innerHTML='<div class="sec-lbl">DONNÉES</div><div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #111;"><div style="font-size:14px;">Séances</div><div style="color:var(--acc);font-weight:700;">'+S.sessions.length+'</div></div><div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #111;"><div style="font-size:14px;">En attente</div><div style="color:'+(S.pendingSync.length?'var(--acc)':'var(--green)')+';font-weight:700;">'+S.pendingSync.length+'</div></div><div style="display:flex;justify-content:space-between;padding:14px 0;"><div style="font-size:14px;">PRs</div><div style="color:var(--acc);font-weight:700;">'+Object.keys(S.prs).length+'</div></div>';
  var pb=el('button',{class:'danger-btn'});pb.textContent='Réinitialiser le PIN Enhancement';pb.onclick=function(){if(confirm('Réinitialiser le PIN ?')){S.enhPinSet=null;S.enhUnlocked=false;saveLocal();render();}};
  var rb=el('button',{class:'danger-btn'});rb.textContent='Effacer toutes les données locales';rb.onclick=function(){if(confirm('Effacer ?')){localStorage.removeItem(LS);location.reload();}};
  scroll.appendChild(card);scroll.appendChild(expCard);scroll.appendChild(info);scroll.appendChild(pb);scroll.appendChild(rb);wrap.appendChild(scroll);

function renderNav(){
  var nav=el('nav');
  [['log','➕','Logger'],['history','📋','Séances'],['stats','📊','Stats'],['cycle','🔄','Cycle'],['enh','🧬','Enhance'],['settings','⚙️','Réglages']].forEach(function(tab){
    var b=el('button',{class:S.view===tab[0]?'active':''});
    b.innerHTML='<div class="ico">'+tab[1]+'</div><div class="lbl">'+tab[2].toUpperCase()+'</div>';
    b.onclick=function(){
      if(tab[0]==='log')S.step='muscle';
      if(tab[0]==='cycle'&&S.view!=='cycle'){S.cycleView='home';S._statsExo=null;}
      if(tab[0]==='enh'&&S.view!=='enh')S.enhUnlocked=false;
      S.view=tab[0];render();
    };
    nav.appendChild(b);
  });
  return nav;
}

function updSB(){var sb=document.getElementById('save-btn');if(sb)sb.className='save-btn '+(S.reps&&S.weight?'ready':'empty');}
function saveSet(){if(!S.reps||!S.weight)return;S.sets.push({reps:S.reps,weight:S.weight});S.flashIdx=S.sets.length-1;startRest(90);render();setTimeout(function(){S.flashIdx=-1;},500);}
function finishSession(){
  if(!S.sets.length){resetLog();return;}
  var exName=S.selExo.n+' — '+S.selVariant;
  var maxRM=Math.max.apply(null,S.sets.map(function(s){return est1RM(s.weight,s.reps);}));
  var vol=Math.round(S.sets.reduce(function(a,s){return a+s.weight*s.reps;},0));
  var session={id:Date.now(),date:today(),muscle:S.selMuscle.label,muscleId:S.selMuscle.id,exercise:exName,sets:S.sets,estimated1RM:maxRM,totalVolume:vol};
  if(!S.prs[exName]||maxRM>S.prs[exName])S.prs[exName]=maxRM;
  S.sessions.unshift(session);S.pendingSync.push(session);saveLocal();
  if(SHEET_URL&&SHEET_URL!=='skip')syncSheets(S.pendingSync,S.prs);
  resetLog();
}
function resetLog(){clearInterval(restIv);S.sets=[];S.reps=8;S.flashIdx=-1;S.step='muscle';S.selMuscle=null;S.selExo=null;S.selVariant=null;S.restSecs=0;S.restDur=90;render();}
function startRest(secs){
  clearInterval(restIv);S.restSecs=secs;S.restDur=secs;
  restIv=setInterval(function(){S.restSecs--;var t=document.getElementById('rt'),f=document.getElementById('rf');if(t)t.textContent=S.restSecs+'s';if(f)f.style.width=Math.round((S.restSecs/S.restDur)*100)+'%';if(S.restSecs<=0){clearInterval(restIv);S.restSecs=0;}},1000);
  if(!document.querySelector('.rest-bar'))render();
}
render();
